name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Um job só, steps em ordem barato→caro. Steps param no primeiro que falhar,
  # então format quebrado nem chega a rodar build. Ubuntu porque nada aqui é
  # Windows-específico (nativo é mockado/externo; build só empacota).
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # --ignore-scripts pula o rebuild nativo (electron-builder install-app-deps):
      # testes mockam o nativo e o build só empacota, então não precisa buildar.
      - name: Instalar dependências
        run: npm ci --ignore-scripts

      - name: Formatação
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      # Falha se algum teste quebrar ou a cobertura da lógica pura cair <85%.
      - name: Testes + cobertura
        run: npm run test:coverage

      - name: Publicar cobertura no Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false

      # Mais caro por último: só roda se tudo acima passou.
      - name: Build
        run: npx electron-vite build
