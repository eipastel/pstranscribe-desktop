name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    name: Validação
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # npm ci roda uma vez; os steps seguintes reaproveitam node_modules.
      - name: Instalar dependências
        run: npm ci

      - name: Formatação (prettier)
        run: npm run format:check

      - name: Lint (eslint)
        run: npm run lint

      - name: Typecheck (tsc)
        run: npm run typecheck

      - name: Testes unitários (vitest)
        run: npm run test

      # typecheck já rodou acima — aqui só empacota (evita compilar de novo).
      - name: Build (electron-vite)
        run: npx electron-vite build
