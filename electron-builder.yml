appId: com.eipastel.pstranscribe
productName: PSTranscribe
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md,CLAUDE.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!{pscode,.claude}/**'
asarUnpack:
  - resources/**
win:
  executableName: pstranscribe
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
publish:
  provider: github
  owner: eipastel
  repo: pstranscribe-desktop
  # Publica o release direto (não como draft) — o auto-update lê de releases publicados.
  releaseType: release
npmRebuild: false
